apiVersion: v1
kind: Service
metadata:
  name: { { .Values.app.name } }
  labels:
    app.kubernetes.io/name: { { .Values.app.name } }
    app.kubernetes.io/instance: { { .Release.Name } }
spec:
  type: ClusterIP
  selector:
    app: { { .Values.app.name } }
  ports:
    - name: http
      protocol: TCP
      port: { { .Values.app.port } }
      targetPort: http
